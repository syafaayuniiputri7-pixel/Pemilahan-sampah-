<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Taman Kompos Kreatif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #f0fdf4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
        }
        canvas {
            display: block;
            background: linear-gradient(to bottom, #87ceeb, #e0f2fe);
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        #ui-layer {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            color: #14532d;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            z-index: 10;
        }
        .main-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 2rem;
            border-radius: 2rem;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            z-index: 100;
            width: 90%;
            max-width: 400px;
            border: 5px solid #22c55e;
        }
        .btn-menu {
            width: 100%;
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 1rem;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }
        .btn-menu:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.2); }
        
        .btn-play { background: #16a34a; }
        .btn-garden { background: #eab308; }
        .btn-shop { background: #2563eb; }

        #shop-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 1.5rem;
            border-radius: 1.5rem;
            z-index: 110;
            width: 95%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            display: none;
            border: 4px solid #2563eb;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .shop-item {
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        #edit-mode-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            z-index: 60;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="text-3xl text-yellow-600">💰 Rp<span id="money-val">0</span></div>
        <div id="lives-ui" class="text-xl mt-1 text-red-600 hidden">❤️ Nyawa: <span id="lives-val">3</span></div>
    </div>

    <!-- Menu Utama -->
    <div id="main-menu" class="main-menu">
        <h1 class="text-2xl font-black text-green-700 mb-6 uppercase tracking-wider">Taman Kompos</h1>
        <button id="btn-start-misi" class="btn-menu btn-play">🚀 MULAI MISI</button>
        <button id="btn-start-taman" class="btn-menu btn-garden">🌻 ATUR TAMAN</button>
        <button id="btn-start-toko" class="btn-menu btn-shop">🛒 TOKO HIASAN</button>
        <p class="text-xs text-gray-500 mt-4">Kumpulkan sampah organik untuk koin!</p>
    </div>

    <!-- Toko Modal -->
    <div id="shop-modal">
        <div class="flex justify-between items-center border-b pb-2">
            <h2 class="text-xl font-bold text-blue-700">Katalog Toko</h2>
            <button id="close-shop" class="text-gray-500 text-2xl">&times;</button>
        </div>
        <div id="shop-list" class="shop-grid"></div>
    </div>

    <div id="edit-mode-ui">
        ✨ Mode Dekorasi: Geser tanaman! | <button id="exit-edit" class="underline font-bold">Selesai</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const moneyEl = document.getElementById('money-val');
        const livesEl = document.getElementById('lives-val');
        const livesUI = document.getElementById('lives-ui');
        const mainMenu = document.getElementById('main-menu');
        const shopModal = document.getElementById('shop-modal');
        const shopList = document.getElementById('shop-list');
        const editUI = document.getElementById('edit-mode-ui');

        // State
        let currentMoney = 100; 
        let currentLives = 3;
        let gameActive = false;
        let isEditMode = false;
        let gardenPlants = [];
        let items = [];
        let draggedPlant = null;
        let lastTime = 0;
        let spawnTimer = 0;
        let spawnRate = 1200;

        const SHOP_ITEMS = [
            { id: 'f1', name: 'Mawar Merah', emoji: '🌹', price: 150 },
            { id: 'f2', name: 'Matahari', emoji: '🌻', price: 250 },
            { id: 'f3', name: 'Tulip Ungu', emoji: '🌷', price: 200 },
            { id: 'f4', name: 'Sakura Jepang', emoji: '🌸', price: 600 },
            { id: 'f5', name: 'Teratai Biru', emoji: '🪷', price: 450 },
            { id: 'f6', name: 'Kaktus Gurun', emoji: '🌵', price: 300 },
            { id: 't1', name: 'Pohon Oak', emoji: '🌳', price: 1200 },
            { id: 't2', name: 'Cemara Tinggi', emoji: '🌲', price: 1100 },
            { id: 't3', name: 'Bonsai Elok', emoji: '🪴', price: 850 },
            { id: 'd1', name: 'Bangku Taman', emoji: '🪑', price: 700 },
            { id: 'd2', name: 'Lampu Antik', emoji: '💡', price: 500 },
            { id: 'd3', name: 'Air Mancur', emoji: '⛲', price: 4500 },
            { id: 'd4', name: 'Pagar Kayu', emoji: '🧱', price: 120 },
            { id: 'd5', name: 'Ayunan', emoji: '🎠', price: 3000 },
            { id: 'd6', name: 'Kupu-Kupu', emoji: '🦋', price: 400 },
            { id: 'd7', name: 'Patung Gnome', emoji: '🎅', price: 900 }
        ];

        const CATEGORIES = {
            ORGANIC: ['🍎', '🍌', '🥬', '🍉', '🥕'],
            INORGANIC: ['🥤', '缶', '🥫', '🔋', '🛍️']
        };

        const player = { width: 110, height: 90, x: 0, y: 0, targetX: 0 };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            player.y = canvas.height - 220;
            player.x = canvas.width/2 - 55;
            player.targetX = player.x;
        }
        window.addEventListener('resize', resize);
        resize();

        // Audio
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        function playTone(f, type, d, v=0.05) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(v, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + d);
        }

        // Mouse/Touch Interaction
        function getPos(e) {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: cx - r.left, y: cy - r.top };
        }

        canvas.addEventListener('mousedown', e => {
            if (!isEditMode) return;
            const p = getPos(e);
            for (let i = gardenPlants.length - 1; i >= 0; i--) {
                const plant = gardenPlants[i];
                if (Math.hypot(plant.x - p.x, plant.y - p.y) < 30) {
                    draggedPlant = plant; break;
                }
            }
        });

        window.addEventListener('mousemove', e => {
            const p = getPos(e);
            if (draggedPlant) {
                draggedPlant.x = p.x; draggedPlant.y = p.y;
            } else if (gameActive) {
                player.targetX = p.x - player.width / 2;
            }
        });

        window.addEventListener('mouseup', () => draggedPlant = null);

        // Game Loop
        function update(t) {
            const dt = t - lastTime; lastTime = t;

            if (gameActive) {
                player.x += (player.targetX - player.x) * 0.15;
                player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));

                spawnTimer += dt;
                if (spawnTimer > spawnRate) {
                    const isOrg = Math.random() > 0.45;
                    const list = isOrg ? CATEGORIES.ORGANIC : CATEGORIES.INORGANIC;
                    items.push({
                        emoji: list[Math.floor(Math.random() * list.length)],
                        type: isOrg ? 'O' : 'I',
                        x: Math.random() * (canvas.width - 40),
                        y: -50,
                        speed: 3 + Math.random() * 3
                    });
                    spawnTimer = 0;
                }

                for (let i = items.length - 1; i >= 0; i--) {
                    const it = items[i]; it.y += it.speed;
                    const hit = it.y > player.y && it.y < player.y + player.height && it.x > player.x && it.x < player.x + player.width;

                    if (hit) {
                        if (it.type === 'O') { currentMoney += 10; playTone(523, 'sine', 0.1); }
                        else { currentLives--; playTone(150, 'sawtooth', 0.2); }
                        items.splice(i, 1); updateUI();
                    } else if (it.y > canvas.height - 100) {
                        if (it.type === 'O') currentLives--;
                        items.splice(i, 1); updateUI();
                    }
                    if (currentLives <= 0) stopMisi();
                }
            }
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            
            // Ground
            ctx.fillStyle = '#22c55e';
            ctx.fillRect(0, canvas.height - 150, canvas.width, 150);
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(0, canvas.height - 160, canvas.width, 10);

            // Plants
            gardenPlants.forEach(p => {
                ctx.save();
                ctx.font = `${p.size}px Arial`;
                ctx.textAlign = 'center';
                if(p === draggedPlant) { ctx.shadowBlur = 20; ctx.shadowColor = 'white'; }
                ctx.fillText(p.emoji, p.x, p.y);
                ctx.restore();
            });

            // Bin
            if (gameActive) {
                ctx.fillStyle = '#166534';
                ctx.beginPath(); ctx.roundRect(player.x, player.y, player.width, player.height, 10); ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('ORGANIK', player.x + 55, player.y + 80);
                ctx.font = '30px Arial'; ctx.fillText('♻️', player.x + 55, player.y + 45);
                
                items.forEach(it => {
                    ctx.font = '40px Arial';
                    ctx.fillText(it.emoji, it.x, it.y);
                });
            }
        }

        function updateUI() {
            moneyEl.innerText = currentMoney;
            livesEl.innerText = currentLives;
        }

        function renderShop() {
            shopList.innerHTML = '';
            SHOP_ITEMS.forEach(it => {
                const div = document.createElement('div');
                div.className = 'shop-item';
                div.innerHTML = `
                    <span class="text-3xl mb-1">${it.emoji}</span>
                    <span class="text-[11px] font-bold">${it.name}</span>
                    <span class="text-[10px] text-yellow-600 mb-2">Rp${it.price}</span>
                    <button onclick="buy('${it.id}')" class="bg-blue-600 text-white text-[10px] py-1 px-3 rounded-full font-bold" ${currentMoney < it.price ? 'disabled style="opacity:0.5"' : ''}>BELI</button>
                `;
                shopList.appendChild(div);
            });
        }

        window.buy = (id) => {
            const it = SHOP_ITEMS.find(x => x.id === id);
            if (it && currentMoney >= it.price) {
                currentMoney -= it.price;
                gardenPlants.push({
                    emoji: it.emoji,
                    x: canvas.width/2,
                    y: canvas.height - 80,
                    size: it.id.startsWith('t') || it.id.startsWith('d') ? 55 : 35
                });
                updateUI(); renderShop();
                playTone(800, 'sine', 0.1);
            }
        };

        // Navigation
        document.getElementById('btn-start-misi').onclick = () => {
            initAudio(); mainMenu.style.display = 'none';
            gameActive = true; isEditMode = false; currentLives = 3; items = [];
            livesUI.classList.remove('hidden'); updateUI();
        };

        document.getElementById('btn-start-taman').onclick = () => {
            initAudio(); mainMenu.style.display = 'none';
            isEditMode = true; gameActive = false;
            editUI.style.display = 'block';
        };

        document.getElementById('btn-start-toko').onclick = () => {
            initAudio(); renderShop();
            shopModal.style.display = 'block';
        };

        document.getElementById('exit-edit').onclick = () => {
            editUI.style.display = 'none'; isEditMode = false;
            mainMenu.style.display = 'block';
        };

        document.getElementById('close-shop').onclick = () => {
            shopModal.style.display = 'none';
        };

        function stopMisi() {
            gameActive = false; livesUI.classList.add('hidden');
            mainMenu.style.display = 'block';
        }

        updateUI();
        requestAnimationFrame(update);
    </script>
</body>
</html>
